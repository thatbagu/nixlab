name: Deploy docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdbook and mdbook-mermaid
        run: |
          mkdir -p bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory bin
          curl -sSL https://github.com/badboy/mdbook-mermaid/releases/download/v0.13.0/mdbook-mermaid-v0.13.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --directory bin
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Download mermaid.js
        run: |
          curl -sSL https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js \
            -o docs/mermaid.min.js

      - name: Generate mermaid-init.js
        run: |
          cat > docs/mermaid-init.js << 'EOF'
          window.addEventListener('load', function() {
            mermaid.initialize({ startOnLoad: true, theme: 'dark' });
          });
          EOF

      - name: Build docs
        run: mdbook build docs

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
