# Replace the age key below with your own.
# Generate one with: age-keygen -o ~/.config/sops/age/keys.txt
# Then print the public key: age-keygen -y ~/.config/sops/age/keys.txt
keys:
  - &primary age1REPLACE_WITH_YOUR_AGE_PUBLIC_KEY
creation_rules:
  - path_regex: .*secrets\.yaml$
    key_groups:
    - age:
      - *primary
